name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx jest --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PCT=$(node -e "const s = require('./coverage/coverage-summary.json'); console.log(s.total.lines.pct)")
          COLOR=$(node -e "const p = $PCT; console.log(p >= 95 ? 'brightgreen' : p >= 80 ? 'yellow' : 'red')")
          mkdir -p badge
          cat > badge/coverage.json <<BADGE
          {"schemaVersion":1,"label":"coverage","message":"${PCT}%","color":"${COLOR}"}
          BADGE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout --orphan gh-pages-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp -r badge/* .
          git add coverage.json
          git commit -m "Update coverage badge: ${PCT}%"
          git push origin HEAD:gh-pages --force
